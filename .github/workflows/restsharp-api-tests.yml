name: RestSharp API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Node dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run app, run RestSharp tests, then stop app
        run: |
          npm run start &
          APP_PID=$!

          npx wait-on --timeout 60000 --verbose http-get://localhost:3000/api/images

          cd api-restsharp-tests
          dotnet restore
          dotnet test --logger "trx;LogFileName=restsharp-test-results.trx"
          TEST_EXIT_CODE=$?
          cd ..

          kill $APP_PID
          exit $TEST_EXIT_CODE

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restsharp-test-results
          path: api-restsharp-tests/**/restsharp-test-results.trx
